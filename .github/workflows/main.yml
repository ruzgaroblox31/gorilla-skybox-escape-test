name: Godot Build

on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Download Godot Engine
        run: |
          # 4.3 sürümüne yükselttik (Senin projenin açılabilmesi için)
          wget -q https://github.com/godotengine/godot/releases/download/4.3-stable/Godot_v4.3-stable_linux.x86_64.zip
          unzip -q Godot_v4.3-stable_linux.x86_64.zip
          mv Godot_v4.3-stable_linux.x86_64 godot
          chmod +x godot

      - name: Export Project
        run: |
          mkdir build
          # Android yerine şimdilik Linux export edelim, sorunsuz çalışıp çalışmadığını görelim.
          # Eğer export_presets.cfg dosyasında Linux adında ayarın yoksa, 
          # ismini projenin içine girdiğinde gördüğün isme göre değiştir.
          ./godot --headless --export-release "Linux" build/game.x86_64

      - name: Upload Build Artifact
        uses: actions/upload-artifact@v4
        with:
          name: game-build
          path: build/
